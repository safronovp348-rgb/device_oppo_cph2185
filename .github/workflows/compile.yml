name: Сборка TWRP для OPPO A15

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Очистка и подготовка окружения
      uses: actions/checkout@v4

    - name: Установка необходимых пакетов Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo apt-add-repository -y universe
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32z1-dev liblz4-tool libncurses-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip python3-minimal libelf-dev

    - name: Установка утилиты Repo от Google
      run: |
        mkdir -p ~/bin
        curl -sSL https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Синхронизация минимальных исходников TWRP
      run: |
        git config --global --add safe.directory '*'
        mkdir -p ~/twrp && cd ~/twrp
        git config --global user.name "safronovp348-rgb"
        git config --global user.email "safronovp348-rgb@github.com"
        repo init --depth=1 -u https://github.com -b twrp-9.0
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Клонирование твоего Device Tree в структуру сборщика
      run: |
        mkdir -p ~/twrp/device/oppo/cph2185
        cp -r * ~/twrp/device/oppo/cph2185/

    - name: Запуск компиляции чистого TWRP
      run: |
        cd ~/twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_cph2185-userdebug
        make recoveryimage -j$(nproc --all)

    - name: Загрузка готового образа на Гитхаб
      uses: actions/upload-artifact@v4
      with:
        name: twrp_oppo_a15_compiled
        path: /home/runner/twrp/out/target/product/cph2185/recovery.img
